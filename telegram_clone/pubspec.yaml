name: telegram_clone
description: A production-level Telegram-like messaging application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3+1

  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # WebSocket
  web_socket_channel: ^2.4.5

  # Media
  image_picker: ^1.1.2
  file_picker: ^6.2.1
  photo_view: ^0.15.0
  mime: ^1.0.5
  http_parser: ^4.0.2
  open_filex: ^4.3.4

  # Notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2

  # Utils
  rxdart: ^0.27.7

  # UI
  cached_network_image: ^3.3.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
